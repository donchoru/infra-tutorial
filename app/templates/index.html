<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infra Tutorial App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .badge.local      { background: #6b7280; }
        .badge.baremetal   { background: #059669; }
        .badge.docker      { background: #2563eb; }
        .badge.kubernetes  { background: #7c3aed; }
        h1 { font-size: 24px; margin-bottom: 24px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .info-row:last-child { border-bottom: none; }
        .label { color: #94a3b8; font-size: 14px; }
        .value { font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge {{ deploy_env }}">{{ deploy_env }}</span>
        <h1>Infra Tutorial</h1>
        <div class="info-row">
            <span class="label">Hostname</span>
            <span class="value">{{ hostname }}</span>
        </div>
        <div class="info-row">
            <span class="label">IP Address</span>
            <span class="value">{{ ip }}</span>
        </div>
        <div class="info-row">
            <span class="label">Deploy Env</span>
            <span class="value">{{ deploy_env }}</span>
        </div>
        <div class="info-row">
            <span class="label">Uptime</span>
            <span class="value">{{ uptime }}</span>
        </div>
        <div class="info-row">
            <span class="label">Server Time</span>
            <span class="value">{{ current_time }}</span>
        </div>
    </div>
</body>
</html>
