apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-tutorial
  namespace: infra-tutorial
  labels:
    app: infra-tutorial
spec:
  replicas: 3
  selector:
    matchLabels:
      app: infra-tutorial
  template:
    metadata:
      labels:
        app: infra-tutorial
    spec:
      containers:
        - name: app
          image: infra-tutorial:latest
          imagePullPolicy: Never  # 로컬 이미지 사용 (minikube)
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
